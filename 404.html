<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · שעון יהודי</title>
  <link rel="stylesheet" href="assets/css/fonts.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Assistant', system-ui, sans-serif;
      background: radial-gradient(ellipse at center, #1a1d28 0%, #0c0e13 100%);
      color: #f4ecd8;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 500px; }
    h1 {
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 800;
      color: #c9a258;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    h2 { font-size: 1.5rem; color: #e6c47a; margin: 0 0 1.5rem; font-weight: 600; }
    p { color: #b0aa9c; margin: 0 0 2rem; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 0.85rem 2rem;
      border: 1px solid #c9a258;
      color: #c9a258;
      text-decoration: none;
      border-radius: 3px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    a:hover { background: #c9a258; color: #0c0e13; }
    .star { font-size: 3rem; opacity: 0.6; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="star">✦</div>
    <h1>404</h1>
    <h2>הדף לא נמצא</h2>
    <p>נראה שהגעתם לדף שלא קיים.<br>אולי הוא נדד למקום אחר?</p>
    <a href="./">חזרה לשעון</a>
  </div>
</body>
</html>
